version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tesku_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tesku
    ports:
      - "5433:5432"
    volumes:
      - tesku_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tesku_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  tesku_db_data:
